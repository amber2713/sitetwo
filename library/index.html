<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Library Explorer · Echoes of Memory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* enhances immersion, click remains functional */
        }

        body {
            font-family: 'Cambria', Georgia, 'Times New Roman', serif;
            background-color: #0a0c15;
            color: #f0f0f0;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            background-image: url('./images/tushuguan.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            transition: background-color 0.6s ease, color 0.4s ease;
        }

        /* semi-transparent dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 2, 20, 0.82);
            z-index: -1;
            transition: background 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            pointer-events: none;
        }

        /* LIGHT MODE (phase two) – significantly brighter */
        body.light-mode {
            color: #1e2a2e;
        }
        body.light-mode .overlay {
            background: rgba(245, 240, 225, 0.78);
        }
        body.light-mode .quote-box {
            background: rgba(250, 248, 235, 0.85);
            border: 1px solid rgba(180, 130, 70, 0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        body.light-mode .quote {
            color: #3e2c1a;
            text-shadow: none;
        }
        body.light-mode .title {
            background: linear-gradient(135deg, #8b5a2b, #c68b3c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        body.light-mode .navbar {
            background: rgba(245, 240, 225, 0.6);
            border-bottom: 1px solid rgba(150, 110, 60, 0.3);
            backdrop-filter: blur(12px);
        }
        body.light-mode .footer {
            color: #4a3b28;
            background: rgba(245, 240, 225, 0.5);
        }
        body.light-mode .explore-icon {
            background: rgba(160, 110, 50, 0.9);
            border: 2px solid #ffdd99;
            box-shadow: 0 0 18px rgba(200, 140, 40, 0.7);
        }
        body.light-mode .explore-icon i {
            color: #fff3e0;
        }
        body.light-mode .explore-text {
            color: #5a3a1a;
            font-weight: bold;
        }

        /* floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 235, 190, 0.7);
            animation: float 18s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0.7; }
            100% { transform: translateY(-100vh) translateX(80px); opacity: 0; }
        }

        /* navbar - left icon removed */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(10, 15, 30, 0.45);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 15;
        }
        .title {
            font-size: 2.7rem;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ecdca8, #cbad7a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        /* main container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 24px 60px;
            text-align: center;
            max-width: 950px;
            margin: 0 auto;
            width: 100%;
        }

        /* quote box */
        .quote-box {
            background: rgba(20, 25, 45, 0.7);
            border-radius: 28px;
            padding: 38px 32px;
            margin: 20px 0 30px;
            border: 1px solid rgba(200, 170, 110, 0.6);
            width: 100%;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
            transition: all 0.4s;
        }
        .quote {
            font-size: 1.55rem;
            line-height: 1.65;
            color: #f3e7ce;
            font-style: italic;
            white-space: pre-wrap;
            font-weight: 500;
            transition: color 0.2s;
        }

        /* blinking cursor for typing */
        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #dbb879;
            margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* book container – phase one */
        .book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0 30px;
            cursor: pointer;
            transition: transform 0.25s ease, filter 0.2s;
        }
        .book-wrapper:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 12px rgba(230, 200, 120, 0.5));
        }
        .book-img {
            max-width: 240px;
            width: 70%;
            height: auto;
            border-radius: 16px;
            transition: all 0.2s;
            filter: drop-shadow(4px 8px 16px rgba(0,0,0,0.5));
            object-fit: contain;
        }
        .clickable-book {
            cursor: pointer;
        }

        /* explore entrance (phase two) */
        .explore-icon {
            display: none; 
            align-items: center;
            justify-content: center;
            width: 110px;
            height: 110px;
            background: rgba(190, 150, 85, 0.85);
            border-radius: 60px;
            border: 2px solid #e7c389;
            cursor: pointer;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(2px);
        }
        .explore-icon i {
            font-size: 48px;
            color: #2b1e0c;
        }
        .explore-icon:hover {
            transform: scale(1.08);
            background: #c99f5e;
            box-shadow: 0 0 20px rgba(230, 190, 100, 0.8);
        }
        .explore-text {
            display: none;
            margin-top: 14px;
            font-size: 1.25rem;
            letter-spacing: 1px;
            color: #ecdca8;
            font-weight: 600;
            background: rgba(0,0,0,0.3);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }

        .footer {
            text-align: center;
            padding: 18px;
            font-size: 0.85rem;
            color: #b9aa86;
            background: rgba(10, 15, 30, 0.5);
            transition: all 0.3s;
            margin-top: 30px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 650px) {
            .title { font-size: 2rem; }
            .quote { font-size: 1.25rem; }
            .quote-box { padding: 28px 20px; }
            .book-img { max-width: 180px; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="navbar">
        <!-- empty placeholder to keep title centered (map icon removed) -->
        <div style="width: 60px;"></div>
        <h1 class="title">Library</h1>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        <div class="quote-box">
            <p class="quote" id="monologue"></p>
        </div>

        <!-- Phase One: closed book image (path /images/book) -->
        <div id="bookContainer" class="book-wrapper clickable-book">
            <img id="closedBook" class="book-img" src="/images/book.jpg" alt="A dusty old book" 
                 onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%238B5A2B\'/%3E%3Cpath fill=\'%23EBC485\' d=\'M30,25 L70,25 L70,75 L30,75 Z\'/%3E%3Cline x1=\'45\' y1=\'35\' x2=\'65\' y2=\'35\' stroke=\'%23443322\' stroke-width=\'3\'/%3E%3Cline x1=\'45\' y1=\'47\' x2=\'60\' y2=\'47\' stroke=\'%23443322\' stroke-width=\'3\'/%3E%3Ccircle cx=\'45\' cy=\'62\' r=\'5\' fill=\'%23DDAA66\'/%3E%3C/svg%3E';">
        </div>

        <!-- Explore entrance (appears in phase two) -->
        <a href="https://amber2713.github.io/sitetwo/hall/" class="explore-icon" id="exploreIcon">
            <i class="fas fa-compass"></i>
        </a>
        <div class="explore-text" id="exploreText">Explore the Library</div>
    </div>

    <div class="footer">
        <p>© 3099 · Library of Recollection</p>
    </div>

    <script>
        // ========== TWO-PHASE NARRATIVE ==========
        // Phase 0: dilapidated library (initial)
        // Phase 1: bright, transformed library
        
        let currentPhase = 0;
        let typingTimeout = null;
        let isTypingInProgress = false;
        let phaseTransitionLock = false;

        // DOM elements
        const monologueEl = document.getElementById('monologue');
        const bookContainer = document.getElementById('bookContainer');
        const exploreIcon = document.getElementById('exploreIcon');
        const exploreText = document.getElementById('exploreText');
        const bodyEl = document.body;

        // ---------- ENGLISH TEXTS (fully localized) ----------
        const phase0Text = `I've come to the library of USTC, which in my memory holds all knowledge, but it looks so dilapidated now.\nHey, there's a book on the floor. Let me pick it up and see.`;
        
        const phase1Text = `What was that book? It's gone. This library feels different now.`;

        const TYPING_SPEED = 55;

        function abortTyping() {
            if (typingTimeout) {
                clearTimeout(typingTimeout);
                typingTimeout = null;
            }
            isTypingInProgress = false;
        }

        function resetAndClearText() {
            abortTyping();
            if (monologueEl) {
                monologueEl.textContent = '';
                monologueEl.classList.remove('cursor');
            }
        }

        // Typewriter effect
        function typeTextToElement(text, onComplete, removeCursorWhenDone = true) {
            if (!monologueEl) return;
            abortTyping();
            monologueEl.textContent = '';
            monologueEl.classList.add('cursor');
            
            let idx = 0;
            const len = text.length;
            
            function typeChar() {
                if (idx < len) {
                    monologueEl.textContent += text[idx];
                    idx++;
                    typingTimeout = setTimeout(typeChar, TYPING_SPEED);
                } else {
                    if (removeCursorWhenDone) {
                        monologueEl.classList.remove('cursor');
                    }
                    isTypingInProgress = false;
                    typingTimeout = null;
                    if (onComplete && typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            }
            isTypingInProgress = true;
            typeChar();
        }

        // ---------- ENTER BRIGHT LIBRARY (PHASE TWO) ----------
        function enterBrightLibrary() {
            if (phaseTransitionLock) return;
            if (currentPhase === 1) return;
            
            phaseTransitionLock = true;
            currentPhase = 1;
            
            // 1. Hide the closed book (phase one element)
            if (bookContainer) {
                bookContainer.style.display = 'none';
            }
            
            // 2. Apply light mode class (brighter ambiance)
            bodyEl.classList.add('light-mode');
            
            // 3. Clear previous text and type phase one text
            resetAndClearText();
            
            // 4. Type the phase two monologue, then reveal explore button
            typeTextToElement(phase1Text, () => {
                showExploreEntrance();
            }, true);
        }
        
        // Fade in the explore button and text
        function showExploreEntrance() {
            if (!exploreIcon || !exploreText) return;
            exploreIcon.style.display = 'flex';
            exploreText.style.display = 'block';
            exploreIcon.style.opacity = '0';
            exploreText.style.opacity = '0';
            exploreIcon.style.transition = 'opacity 0.9s ease';
            exploreText.style.transition = 'opacity 0.9s ease';
            
            setTimeout(() => {
                exploreIcon.style.opacity = '1';
                exploreText.style.opacity = '1';
            }, 30);
        }
        
        // ---------- PHASE ONE INITIALIZATION ----------
        function initPhaseOne() {
            currentPhase = 0;
            phaseTransitionLock = false;
            // Remove light mode class (dark atmosphere)
            bodyEl.classList.remove('light-mode');
            
            // Hide explore entrance if visible
            if (exploreIcon) {
                exploreIcon.style.display = 'none';
                exploreIcon.style.opacity = '0';
            }
            if (exploreText) {
                exploreText.style.display = 'none';
                exploreText.style.opacity = '0';
            }
            
            // Ensure book container is visible
            if (bookContainer) {
                bookContainer.style.display = 'flex';
            }
            
            // Reset text and start typing phase 0 monologue
            resetAndClearText();
            typeTextToElement(phase0Text, () => {
                if (monologueEl) monologueEl.classList.remove('cursor');
            }, true);
        }
        
        // Book click handler (transition to phase two)
        function onBookClickHandler(event) {
            if (currentPhase !== 0) return;
            if (phaseTransitionLock) return;
            enterBrightLibrary();
        }
        
        // Create floating particles (decorative)
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            if (!particlesContainer) return;
            particlesContainer.innerHTML = '';
            const particleCount = 55;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 1.5;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `${Math.random() * 100}%`;
                p.style.animationDuration = `${12 + Math.random() * 18}s`;
                p.style.animationDelay = `${Math.random() * 15}s`;
                p.style.opacity = `${0.3 + Math.random() * 0.5}`;
                particlesContainer.appendChild(p);
            }
        }
        
        // Robust image fallback handling (path /images/book)
        function enhanceBookImageFallback() {
            const bookImg = document.getElementById('closedBook');
            if (!bookImg) return;
            if (bookImg.complete && (bookImg.naturalWidth === 0 || bookImg.naturalHeight === 0)) {
                if (!bookImg.src.includes('data:image/svg')) {
                    bookImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%238B5A2B'/%3E%3Cpath fill='%23EBC485' d='M30,25 L70,25 L70,75 L30,75 Z'/%3E%3Cline x1='45' y1='35' x2='65' y2='35' stroke='%23443322' stroke-width='3'/%3E%3Cline x1='45' y1='47' x2='60' y2='47' stroke='%23443322' stroke-width='3'/%3E%3Ccircle cx='45' cy='62' r='5' fill='%23DDAA66'/%3E%3C/svg%3E";
                }
            }
        }
        
        // Gentle attempt to load real images without breaking path specification
        function smartLoadBookImage() {
            const img = document.getElementById('closedBook');
            if (!img) return;
            const originalPath = img.getAttribute('src');
            if (originalPath && originalPath !== '/images/book.jpg') return;
            const testImg = new Image();
            testImg.onload = function() {
                if (img.src === '/images/book.jpg') {
                    img.src = '/images/book.jpg';
                }
            };
            testImg.onerror = function() {
                const testImg2 = new Image();
                testImg2.onload = function() {
                    if (img.src === '/images/book.jpg') {
                        img.src = '/images/book.jpg';
                    }
                };
                testImg2.src = '/images/book.jpg';
            };
            testImg.src = '/images/book.jpg';
        }
        
        function bindBookEvents() {
            if (bookContainer) {
                bookContainer.addEventListener('click', onBookClickHandler);
                bookContainer.style.cursor = 'pointer';
            }
        }
        
        window.addEventListener('beforeunload', () => {
            if (typingTimeout) clearTimeout(typingTimeout);
        });
        
        // Ensure phase consistency after potential refresh
        function resetToPhaseOne() {
            if (currentPhase === 1) {
                bodyEl.classList.remove('light-mode');
                currentPhase = 0;
                phaseTransitionLock = false;
                if (bookContainer) bookContainer.style.display = 'flex';
                if (exploreIcon) exploreIcon.style.display = 'none';
                if (exploreText) exploreText.style.display = 'none';
                resetAndClearText();
                typeTextToElement(phase0Text, () => {
                    if (monologueEl) monologueEl.classList.remove('cursor');
                }, true);
            } else {
                initPhaseOne();
            }
        }
        
        function init() {
            createParticles();
            initPhaseOne();
            bindBookEvents();
            enhanceBookImageFallback();
            smartLoadBookImage();
        }
        
        init();
        
        // MutationObserver to ensure book stays hidden in phase two
        const observer = new MutationObserver(() => {
            if (currentPhase === 1 && bookContainer && bookContainer.style.display !== 'none') {
                bookContainer.style.display = 'none';
            }
        });
        if (bookContainer) observer.observe(bookContainer, { attributes: true, attributeFilter: ['style'] });
        
        // Normal click behavior for explore link (preserves target URL)
        if (exploreIcon) {
            exploreIcon.addEventListener('click', (e) => {
                // standard navigation, link unchanged
            });
        }
    </script>
</body>
</html>
